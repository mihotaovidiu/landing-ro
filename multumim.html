<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mulțumim!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f6faf8; color: #16211d; line-height: 1.55;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px; text-align: center;
  }
  .card {
    background: #fff; border-radius: 18px; padding: 40px 28px;
    box-shadow: 0 6px 24px rgba(0,0,0,.08); max-width: 440px;
  }
  .check {
    width: 64px; height: 64px; border-radius: 50%;
    background: #0e7a5f; color: #fff; font-size: 32px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
  }
  h1 { font-size: 24px; margin-bottom: 10px; }
  p { color: #5b6b64; font-size: 15px; }
</style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h1>Ești pe listă!</h1>
    <p>Te anunțăm pe email imediat ce lansăm. Între timp, dacă ai întrebări sau povești despre facturi/plafoane greșite, răspunde-ne în grupul unde ai găsit linkul — chiar citim tot.</p>
  </div>
</body>
</html>
